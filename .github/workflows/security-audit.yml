name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-audit:
    name: Cargo Audit (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit
        # Fails the build if any dependency has a known CVE

      - name: Cargo check (verify build)
        run: cargo check --release

  npm-audit:
    name: NPM Audit (SDK + Dashboard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit SDK dependencies
        run: |
          cd sdk
          npm install --ignore-scripts
          npm audit --audit-level=high || true

      - name: Audit Dashboard dependencies
        run: |
          cd dashboard
          npm install --ignore-scripts
          npm audit --audit-level=high || true
