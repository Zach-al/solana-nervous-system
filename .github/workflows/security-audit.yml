name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-audit:
    name: Cargo Audit (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit
        # Fails the build if any dependency has a known CVE

      - name: Prepare CI-friendly release profile
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml <<'EOF'
          [profile.release]
          # CI: avoid extremely heavy LTO/linking that OOMs the runner
          opt-level = 2
          lto = false
          codegen-units = 16
          debug = false
          strip = false
          overflow-checks = false
          panic = "abort"
          EOF

      - name: Fast cargo check (catch compile errors quickly)
        run: cargo check --all-targets --verbose

      - name: Cargo built (CI-friendly release, single crate)
        run: cargo build -p sns-daemon --release --verbose

  npm-audit:
    name: NPM Audit (SDK + Dashboard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit SDK dependencies
        run: |
          cd sdk
          npm install --ignore-scripts
          npm audit --audit-level=high || true

      - name: Audit Dashboard dependencies
        run: |
          cd dashboard
          npm install --ignore-scripts
          npm audit --audit-level=high || true
