[package]
name = "sns-daemon"
version = "1.0.0"
edition = "2021"

[[bin]]
name = "sns-daemon"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
axum = "0.7"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Explicit features list without "metrics" (which causes libp2p-kad version conflicts)
libp2p = { version = "0.53", default-features = false, features = [
  "kad",
  "noise",
  "yamux",
  "tcp",
  "tokio",
  "macros",
  "ed25519",
] }
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
# uuid moved to V0.3 section

# dashmap moved to V0.4 section

reqwest = { version = "0.11", default-features = false, features = ["json", "rustls-tls"] }
idna = "=0.5.0"
url = "=2.5.0"
chrono = { version = "0.4", features = ["serde"] }
tower-http = { version = "0.5", features = [
  "cors",
  "trace",
  "compression-gzip",
  "request-id",
  "timeout",
] }

# Security dependencies
hmac = "0.12"
sha2 = "0.10"
digest = "0.10"
# hex moved to V0.4 section

zeroize = { version = "1", features = ["derive"] }
secrecy = "0.8"
# rand moved to V0.4 section

time = "=0.3.36"
base64ct = "=1.6.0"
solana-sdk = "1.18"
solana-client = "1.18"
bs58 = "0.5"
bincode = "1.3"

# V0.4 Privacy Layer (Onion Routing)
aes-gcm = "0.10"
x25519-dalek = { version = "2.0", features = ["static_secrets"] }
chacha20poly1305 = "0.10"
uuid = "1.7"
dashmap = "5.5"
rand = "0.8"
rand_core = "0.6"
hex = "0.4"
base64 = "0.21"


[build-dependencies]
uuid = { version = "1", features = ["v4"] }


